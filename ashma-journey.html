<!DOCTYPE html>
<html>

<head>
  <title>Ashma Bhagad — Journey</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.net.min.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: system-ui, sans-serif;
    }

    #hero {
      height: 100vh;
      position: relative;
    }

    .center-label {
      position: absolute;
      z-index: 2;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
      user-select: none;
    }

    .center-name {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 500;
      margin: 0;
      color: #111;
      letter-spacing: -0.5px;
    }

    .center-tag {
      font-size: clamp(0.75rem, 1.5vw, 1rem);
      color: #555;
      margin: 6px 0 0;
      letter-spacing: 0.02em;
    }

    #journey-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 3;
      pointer-events: none;
    }

    .phase-node {
      pointer-events: all;
      cursor: pointer;
    }

    #tooltip {
      position: absolute;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease, transform 0.22s ease;
      transform: translateY(6px);
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(6px);
      border: 0.5px solid rgba(0, 0, 0, 0.1);
      border-radius: 14px;
      padding: 14px 18px;
      max-width: 230px;
      box-sizing: border-box;
    }

    #tooltip.visible {
      opacity: 1;
      transform: translateY(0);
    }

    #tooltip .t-label {
      font-size: 13px;
      font-weight: 500;
      color: #111;
      margin: 0 0 3px;
    }

    #tooltip .t-year {
      font-size: 11px;
      color: #888;
      margin: 0 0 7px;
    }

    #tooltip .t-detail {
      font-size: 12px;
      color: #444;
      margin: 0;
      line-height: 1.55;
    }
  </style>
</head>

<body>
  <div id="hero">
    <div class="center-label">
      <p class="center-name">Ashma Bhagad</p>
      <p class="center-tag">Building things that don't break</p>
    </div>

    <svg id="journey-svg"></svg>

    <div id="tooltip">
      <p class="t-label" id="t-label"></p>
      <p class="t-year" id="t-year"></p>
      <p class="t-detail" id="t-detail"></p>
    </div>
  </div>

  <script>
    VANTA.NET({
      el: "#hero",
      mouseControls: true,
      touchControls: true,
      gyroControls: false,
      minHeight: 200,
      minWidth: 200,
      scale: 1,
      scaleMobile: 1,
      color: 0x000000,
      backgroundColor: 0xffffff,
      points: 11,
      maxDistance: 25
    });
  </script>

  <script>
    const phases = [
      {
        id: 0, label: 'Diploma', year: '2019 – 2021',
        detail: 'Computer Engineering foundations at Pravin Patil College. Where the curiosity started.',
        color: '#C4C3BE', strokeColor: '#888780', angleDeg: 270, r: 10
      },
      {
        id: 1, label: 'Shopify era', year: '2021 – 2022',
        detail: 'Launched storefronts for Al-Khalid — full UI, payments, SEO. First taste of shipping real products.',
        color: '#9FE1CB', strokeColor: '#1D9E75', angleDeg: 321, r: 10
      },
      {
        id: 2, label: 'the.hustlerswardrobe', year: '2021',
        detail: 'Built a small fashion brand from scratch. Entrepreneurship before it had a name.',
        color: '#ED93B1', strokeColor: '#D4537E', angleDeg: 13, r: 10
      },
      {
        id: 3, label: 'Degree + AI/ML', year: '2021 – 2024',
        detail: 'B.E. in Computer Engineering with AI & ML specialisation. 25% boost in ML detection accuracy.',
        color: '#B5D4F4', strokeColor: '#378ADD', angleDeg: 64, r: 10
      },
      {
        id: 4, label: 'First dev intern', year: 'Dec 2022 – Apr 2023',
        detail: 'NextGen Software — shipped production scrapers from day one. 40% efficiency gain.',
        color: '#FAC775', strokeColor: '#BA7517', angleDeg: 116, r: 10
      },
      {
        id: 5, label: 'Tendersontime', year: '2023 – 2025',
        detail: 'Python at scale — CAPTCHA bypass, IP rotation, 15+ hrs/week automated. 95%+ reliability.',
        color: '#CECBF6', strokeColor: '#7F77DD', angleDeg: 167, r: 10
      },
      {
        id: 6, label: 'Archcorp', year: '2025 – Now',
        detail: 'Full-stack SaaS platform. AWS serverless, WebSockets, ML analytics, 500+ live records.',
        color: '#F0997B', strokeColor: '#D85A30', angleDeg: 219, r: 13, current: true
      },
    ];

    const connections = [
      [0, 1], [0, 3],
      [1, 2],
      [3, 4],
      [4, 5],
      [5, 6],
      [2, 5],
    ];

    const svg = document.getElementById('journey-svg');
    const tooltip = document.getElementById('tooltip');
    const ns = 'http://www.w3.org/2000/svg';

    let W, H, cx, cy, rad;
    let rotationOffset = 0;
    let hoveredId = null;
    let animFrame;

    // Per-node element refs for live updates
    let nodeRefs = []; // { circle, ring, label, p }
    let lineEls = [];
    let lineGroup;

    function currentAngle(p) {
      return p.angleDeg + rotationOffset;
    }

    function pos(angleDeg) {
      const a = (angleDeg - 90) * Math.PI / 180;
      return { x: cx + Math.cos(a) * rad, y: cy + Math.sin(a) * rad };
    }

    function build() {
      W = window.innerWidth;
      H = window.innerHeight;
      cx = W / 2;
      cy = H / 2;
      rad = Math.min(W, H) * 0.34;
      svg.innerHTML = '';
      nodeRefs = [];
      lineEls = [];

      // Connection lines group
      lineGroup = document.createElementNS(ns, 'g');
      lineGroup.setAttribute('opacity', '0.18');
      connections.forEach(([a, b]) => {
        const line = document.createElementNS(ns, 'line');
        line.setAttribute('stroke', '#000');
        line.setAttribute('stroke-width', '1');
        lineGroup.appendChild(line);
        lineEls.push({ line, a, b });
      });
      svg.appendChild(lineGroup);

      // Nodes
      phases.forEach(p => {
        const { x, y } = pos(currentAngle(p));

        const g = document.createElementNS(ns, 'g');
        g.setAttribute('class', 'phase-node');
        g.dataset.id = p.id;

        let ring = null;
        if (p.current) {
          ring = document.createElementNS(ns, 'circle');
          ring.setAttribute('cx', x); ring.setAttribute('cy', y);
          ring.setAttribute('r', p.r + 7);
          ring.setAttribute('fill', 'none');
          ring.setAttribute('stroke', p.strokeColor);
          ring.setAttribute('stroke-width', '1.5');
          ring.setAttribute('opacity', '0.4');
          g.appendChild(ring);
        }

        const circle = document.createElementNS(ns, 'circle');
        circle.setAttribute('cx', x); circle.setAttribute('cy', y);
        circle.setAttribute('r', p.r);
        circle.setAttribute('fill', p.color);
        circle.setAttribute('fill-opacity', '0.9');
        circle.setAttribute('stroke', p.strokeColor);
        circle.setAttribute('stroke-width', '1.5');
        g.appendChild(circle);

        const labelOffset = p.r + 16;
        const text = document.createElementNS(ns, 'text');
        text.setAttribute('x', x);
        text.setAttribute('y', y + labelOffset);
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('font-size', '11');
        text.setAttribute('font-family', 'system-ui, sans-serif');
        text.setAttribute('fill', '#333');
        text.setAttribute('font-weight', '400');
        text.textContent = p.label;
        g.appendChild(text);

        g.addEventListener('mouseenter', e => {
          hoveredId = p.id;
          circle.setAttribute('r', p.r + 3);
          circle.setAttribute('fill-opacity', '1');
          showTip(p, e);
        });
        g.addEventListener('mousemove', e => moveTip(e));
        g.addEventListener('mouseleave', () => {
          hoveredId = null;
          circle.setAttribute('r', p.r);
          circle.setAttribute('fill-opacity', '0.9');
          hideTip();
        });
        g.addEventListener('touchstart', e => {
          e.preventDefault();
          showTip(p, e.touches[0]);
        }, { passive: false });
        g.addEventListener('touchend', hideTip);

        svg.appendChild(g);
        nodeRefs.push({ circle, ring, text, p, g });
      });
    }

    function updatePositions() {
      nodeRefs.forEach(({ circle, ring, text, p }) => {
        const angle = currentAngle(p);
        const { x, y } = pos(angle);
        circle.setAttribute('cx', x);
        circle.setAttribute('cy', y);
        if (ring) {
          ring.setAttribute('cx', x);
          ring.setAttribute('cy', y);
        }
        text.setAttribute('x', x);
        text.setAttribute('y', y + p.r + 16);
      });

      lineEls.forEach(({ line, a, b }) => {
        const pa = pos(currentAngle(phases[a]));
        const pb = pos(currentAngle(phases[b]));
        line.setAttribute('x1', pa.x); line.setAttribute('y1', pa.y);
        line.setAttribute('x2', pb.x); line.setAttribute('y2', pb.y);
      });
    }

    let lastTime = null;
    const SPEED = 4; // degrees per second

    function animate(ts) {
      if (lastTime !== null) {
        const delta = (ts - lastTime) / 1000;
        rotationOffset += SPEED * delta;
        if (rotationOffset >= 360) rotationOffset -= 360;
        updatePositions();
      }
      lastTime = ts;
      animFrame = requestAnimationFrame(animate);
    }

    build();
    updatePositions();
    requestAnimationFrame(animate);

    window.addEventListener('resize', () => {
      build();
      updatePositions();
    });

    function showTip(p, e) {
      document.getElementById('t-label').textContent = p.label;
      document.getElementById('t-year').textContent = p.year;
      document.getElementById('t-detail').textContent = p.detail;
      tooltip.classList.add('visible');
      placeTip(e.clientX, e.clientY);
    }

    function moveTip(e) { placeTip(e.clientX, e.clientY); }

    function placeTip(mx, my) {
      const tw = 248, th = 120;
      let tx = mx + 18, ty = my - 20;
      if (tx + tw > W) tx = mx - tw - 18;
      if (ty + th > H) ty = my - th - 10;
      tooltip.style.left = tx + 'px';
      tooltip.style.top = ty + 'px';
    }

    function hideTip() { tooltip.classList.remove('visible'); }
  </script>

  <style>
    @keyframes pulseRing {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.1; }
    }
  </style>

</body>
</html>
